<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MovieWeb-App{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-content" style="display:flex; align-items:center; gap:0.75rem; justify-content:flex-start; max-width:1200px; margin:0 auto; padding:0 1.5rem;">
            <img src="{{ url_for('static', filename='logo.svg') }}" alt="MovieWeb-App Logo" class="app-logo" width="44" height="44">
            <h1 style="margin:0;">Movie<span>Web</span>-App</h1>
        </div>
    </header>

    <div class="container">
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>

    <footer>
        <p>&copy; 2025 MovieWeb-App. Built with <i class="fas fa-heart" style="color: var(--primary-color);"></i> for film lovers.</p>
    </footer>
</body>
</html>
