{% extends "base.html" %}

{% block content %}
<div style="margin-bottom: 2rem;">
    <a href="{{ url_for('home') }}" style="color: var(--primary-blue); text-decoration: none; font-weight: 600;">← Back to Users</a>
    <h2 style="margin-top: 1rem;">Movies for {{ user.name }}</h2>
</div>

<div class="movie-grid">
    {% for movie in movies %}
    <div class="movie-card-vertical">
        <a href="{{ url_for('movie_details', user_id=user.id, movie_id=movie.id) }}">
            <img src="{{ movie.poster or 'https://via.placeholder.com/300x450?text=' + movie.title }}" 
                 alt="{{ movie.title }}" class="movie-poster-v" style="cursor: pointer;">
        </a>
        
        <form action="{{ url_for('update_movie', user_id=user.id, movie_id=movie.id) }}" method="POST">
            <input type="text" name="title" value="{{ movie.title }}" class="card-input">
            <button type="submit" class="btn-update">Update</button>
        </form>

        <p class="movie-detail-text"><strong>Year:</strong> {{ movie.release_year }}</p>
        <p class="movie-detail-text"><strong>Director:</strong> {{ movie.director }}</p>

        <form action="{{ url_for('delete_movie', user_id=user.id, movie_id=movie.id) }}" method="POST">
            <button type="submit" class="btn-delete" onclick="return confirm('Are you sure you want to delete this movie?')">Delete</button>
        </form>
    </div>
    {% endfor %}
</div>

<div class="card" style="margin-top: 4rem;">
    <h3 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem;">Add New Movie</h3>
    <form action="{{ url_for('add_movie', user_id=user.id) }}" method="POST" style="display: flex; gap: 1rem; align-items: center;">
        <div style="flex: 1; display: flex; flex-direction: column; gap: 0.8rem;">
            <input type="text" name="title" placeholder="Movie title" required style="padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 8px;">
            <input type="number" name="year" placeholder="Year (optional)" style="padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 8px;">
        </div>
        <button type="submit" class="btn" style="height: fit-content; padding: 1rem 2rem;">Add Movie</button>
    </form>
</div>
{% endblock %}
